<title>Übersicht Lineare Algebra 2 [S26]</title>
<!--
  Interaktive Lern-Übersicht zur Linearen Algebra 2
  (Eisermann / Stoll / Klapproth, SoSe 2026, Uni Stuttgart).

  AUFBAU:  Inhalt = Daten (siehe Konstante CATS), Layout = Code.
           Jede Kategorie ist ein Objekt in CATS; jede Technik eine "Karte"
           mit sichtbarer Formel, ausklappbarer Worterklärung (Idee/Bausteine/
           warum praktisch) und ausklappbarem Rechenbeispiel.
  Formeln: lokales KaTeX (assets/katex/, offline, kein CDN).
           Feldwerte IMMER als String.raw setzen (sonst frisst JS die Backslashes),
           KEINE „…" innerhalb von \( \)/\[ \]/\text{} (KaTeX kann sie nicht rendern).
  Siehe WORKFLOW.md im selben Ordner.
-->
<style>
:root{
  --bg:#f5f6fb; --panel:#ffffff; --ink:#1b2233; --muted:#64708b; --line:#e4e8f2;
  --accent:#5b4bd6;
  --g1:#4f46e5; --g1-soft:#e0e7ff;   /* Eigenwerttheorie */
  --g2:#0d9488; --g2-soft:#ccfbf1;   /* Anwendung DGL */
  --g3:#be185d; --g3-soft:#fce7f3;   /* Skalarprodukte */
  --g4:#b45309; --g4-soft:#fef3c7;   /* affin/multilinear */
  --g5:#7c3aed; --g5-soft:#ede9fe;   /* Operatoren / Glossar */
  --ok:#16a34a; --warn:#d97706;
  --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.08);
  --radius:14px;
}
[data-theme="dark"]{
  --bg:#0f141b; --panel:#161d27; --ink:#e6edf6; --muted:#94a2b6; --line:#26303d;
  --accent:#a5b4fc;
  --g1:#818cf8; --g1-soft:#20263c;
  --g2:#2dd4bf; --g2-soft:#0f2e2b;
  --g3:#f472b6; --g3-soft:#3a1426;
  --g4:#fbbf24; --g4-soft:#332410;
  --g5:#a78bfa; --g5-soft:#241b3a;
  --ok:#4ade80; --warn:#fbbf24;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 28px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg); color:var(--ink);
  font:15px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  display:flex; flex-direction:column; min-height:100%}
a{color:var(--accent)}
button{font:inherit; cursor:pointer}
.btn{background:var(--panel); color:var(--ink); border:1px solid var(--line);
  border-radius:10px; padding:6px 12px; box-shadow:var(--shadow)}
.btn:hover{border-color:var(--accent)}

/* ---------- Header ---------- */
header{position:sticky; top:0; z-index:30; background:var(--panel);
  border-bottom:1px solid var(--line); box-shadow:var(--shadow)}
.hwrap{max-width:1180px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:11px; font-weight:700; letter-spacing:.2px}
.brand .logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;
  background:linear-gradient(135deg,var(--g1),var(--g3))}
.brand small{display:block;font-weight:500;color:var(--muted);font-size:11.5px}
.spacer{flex:1}
.search{position:relative}
.search input{width:250px; max-width:52vw; padding:8px 12px 8px 32px; border-radius:10px; border:1px solid var(--line);
  background:var(--bg); color:var(--ink)}
.search .ic{position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted)}
.results{position:absolute; top:110%; left:0; right:0; background:var(--panel); border:1px solid var(--line);
  border-radius:12px; box-shadow:var(--shadow); max-height:340px; overflow:auto; display:none; z-index:40}
.results.show{display:block}
.results a{display:block; padding:9px 12px; color:var(--ink); text-decoration:none; border-bottom:1px solid var(--line)}
.results a:last-child{border-bottom:0}
.results a:hover,.results a.active{background:var(--bg)}
.results .tag{font-size:11px;color:var(--muted)}

/* ---------- Main ---------- */
main{flex:1; width:100%; max-width:1180px; margin:0 auto; padding:20px 18px 40px}
.crumbs{display:flex; gap:6px; flex-wrap:wrap; align-items:center; color:var(--muted); font-size:13px; margin-bottom:16px}
.crumbs a{text-decoration:none}
.crumbs a:hover{text-decoration:underline}
.crumbs .sep{opacity:.5}
.hero{margin:2px 0 22px}
.hero h1{font-size:26px; margin:0 0 6px}
.hero p{color:var(--muted); margin:0; max-width:760px}

/* ---------- Homepage tiles ---------- */
.grp{font-size:13px; font-weight:800; letter-spacing:.7px; text-transform:uppercase; color:var(--muted); margin:26px 0 10px; display:flex; align-items:center; gap:9px}
.grp .dot{width:11px;height:11px;border-radius:3px}
.grp.g1 .dot{background:var(--g1)} .grp.g2 .dot{background:var(--g2)}
.grp.g3 .dot{background:var(--g3)} .grp.g4 .dot{background:var(--g4)}
.grp.g5 .dot{background:var(--g5)}
.tiles{display:grid; grid-template-columns:repeat(auto-fill,minmax(258px,1fr)); gap:13px}
.tile{display:flex; align-items:flex-start; gap:13px; padding:15px 16px; border-radius:var(--radius);
  text-decoration:none; color:#fff; box-shadow:var(--shadow); transition:transform .09s; min-height:84px}
.tile:hover{transform:translateY(-2px)}
.tile .ti{font-size:27px; line-height:1; flex:none}
.tile .tt{font-weight:700; font-size:15px}
.tile small{display:block; font-weight:500; opacity:.93; font-size:12px; margin-top:3px; line-height:1.4}
.tile.g1{background:linear-gradient(135deg,var(--g1),#3730a3)}
.tile.g2{background:linear-gradient(135deg,var(--g2),#0f766e)}
.tile.g3{background:linear-gradient(135deg,var(--g3),#9d174d)}
.tile.g4{background:linear-gradient(135deg,var(--g4),#92400e)}
.tile.g5{background:linear-gradient(135deg,var(--g5),#5b21b6)}
.tile .cnt{margin-left:auto; align-self:center; font-size:11.5px; font-weight:700; background:rgba(255,255,255,.22); border-radius:99px; padding:2px 9px; white-space:nowrap}

/* ---------- Material: Übungen & Prüfungen ---------- */
.sechead{font-size:13px; font-weight:800; letter-spacing:.7px; text-transform:uppercase; color:var(--muted);
  margin:30px 0 12px; display:flex; align-items:center; gap:9px}
.sechead:first-of-type{margin-top:6px}
.tile.m1{background:linear-gradient(135deg,#f59e0b,#d97706)}
.tile.m2{background:linear-gradient(135deg,#22d3ee,#0e7490)}
.tile.m3{background:linear-gradient(135deg,#fb7185,#b91c1c)}
.titlebar.m1 .ic{background:linear-gradient(135deg,#f59e0b,#d97706)}
.titlebar.m2 .ic{background:linear-gradient(135deg,#22d3ee,#0e7490)}
.titlebar.m3 .ic{background:linear-gradient(135deg,#fb7185,#b91c1c)}
.matgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(232px,1fr)); gap:12px}
.matcard{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px;
  box-shadow:var(--shadow); display:flex; flex-direction:column; gap:8px}
.matcard .mct{font-weight:700; font-size:14.5px}
.matcard .mcl{display:flex; flex-wrap:wrap; gap:8px 16px; font-size:13.5px}
.matcard .mcl a{text-decoration:none; font-weight:600}
.matcard .mcl a:hover{text-decoration:underline}
.matcard .mcl .none{color:var(--muted); font-weight:500}
.note{background:var(--g1-soft); border:1px solid var(--line); border-radius:12px; padding:11px 14px;
  font-size:13.5px; color:var(--ink); max-width:820px}
.note code{background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:1px 5px; font-size:12.5px}

/* ---------- Category page ---------- */
.titlebar{display:flex; align-items:center; gap:13px; flex-wrap:wrap; margin-bottom:6px}
.titlebar .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:#fff;font-size:24px;flex:none}
.titlebar.g1 .ic{background:linear-gradient(135deg,var(--g1),#3730a3)}
.titlebar.g2 .ic{background:linear-gradient(135deg,var(--g2),#0f766e)}
.titlebar.g3 .ic{background:linear-gradient(135deg,var(--g3),#9d174d)}
.titlebar.g4 .ic{background:linear-gradient(135deg,var(--g4),#92400e)}
.titlebar.g5 .ic{background:linear-gradient(135deg,var(--g5),#5b21b6)}
.titlebar h1{font-size:23px; margin:0}
.lead{color:var(--muted); margin:4px 0 18px; max-width:820px}
.blockh{font-size:14px; font-weight:800; letter-spacing:.4px; color:var(--accent); margin:26px 0 12px; padding-bottom:6px; border-bottom:2px solid var(--line)}

.cardgrid{display:grid; grid-template-columns:1fr; gap:14px; align-items:start}
@media(min-width:1000px){ .cardgrid{grid-template-columns:1fr 1fr} }
.cardgrid.wide{grid-template-columns:1fr}
.tcard{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:15px 17px; display:flex; flex-direction:column; gap:8px}
.tcard h4{margin:0; font-size:15.5px; display:flex; align-items:baseline; gap:8px}
.tcard h4 .k{font-size:11px; font-weight:700; color:var(--muted); background:var(--bg); border:1px solid var(--line); border-radius:6px; padding:1px 7px; white-space:nowrap}
.tdef{background:var(--bg); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:10px;
  padding:10px 14px; overflow-x:auto}
.tdef p{margin:6px 0}
.tdef p:first-child{margin-top:0} .tdef p:last-child{margin-bottom:0}

/* ---------- ausklappbare Details ---------- */
.example{border:1px solid var(--line); border-radius:10px; background:var(--bg); overflow:hidden}
.example>summary{cursor:pointer; padding:9px 13px; font-size:13px; font-weight:600; color:var(--accent);
  list-style:none; user-select:none}
.example>summary::-webkit-details-marker{display:none}
.example>summary::before{content:"\25B8  "}
.example[open]>summary::before{content:"\25BE  "}
.example[open]>summary{border-bottom:1px solid var(--line)}
.example.worte>summary{color:var(--g2)}
[data-theme="dark"] .example.worte>summary{color:var(--g2)}
.exbody{padding:11px 15px; overflow-x:auto}
.exbody p{margin:7px 0}
.exbody p:first-child{margin-top:0} .exbody p:last-child{margin-bottom:0}
.idea{display:block; margin:7px 0}
.idea b{color:var(--ink)}
.step{margin:8px 0 8px 0; padding-left:14px; border-left:2px solid var(--line)}
.tip{background:var(--g1-soft); border:1px solid var(--line); border-radius:10px; padding:9px 13px; font-size:13.5px; margin:8px 0}
.warnbox{background:var(--g4-soft); border:1px solid var(--line); border-radius:10px; padding:9px 13px; font-size:13.5px; margin:8px 0}

/* ---------- Strukturkarten (SVG-Diagramme der Kategorie „Räume & Strukturen") ---------- */
.smap{padding:6px 0 2px; overflow-x:auto}
.smap svg{display:block; margin:0 auto; width:100%; min-width:680px; height:auto;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
.smap svg text{fill:var(--ink); font-size:12px}
.smap .t{font-weight:700; font-size:13.5px}
.smap .m{font-size:12px}
.smap .s{font-size:11px; fill:var(--muted)}
.smap .lab{font-size:10.5px; fill:var(--muted)}
.smap .bandlab{font-size:11px; font-weight:800; letter-spacing:1.2px; fill:var(--muted)}
.smap .bx{fill:var(--panel); stroke:var(--line); stroke-width:1.4}
.smap .b1{fill:var(--g1-soft); stroke:var(--g1); stroke-width:1.6}
.smap .b2{fill:var(--g2-soft); stroke:var(--g2); stroke-width:1.6}
.smap .b3{fill:var(--g3-soft); stroke:var(--g3); stroke-width:1.6}
.smap .b4{fill:var(--g4-soft); stroke:var(--g4); stroke-width:1.6}
.smap .b5{fill:var(--g5-soft); stroke:var(--g5); stroke-width:1.6}
.smap .fl{stroke:var(--muted); stroke-width:1.6; fill:none}
.smap .fl.dash{stroke-dasharray:5 4}
.smap .arr{fill:var(--muted)}
.smap .vec1{stroke:var(--g1); stroke-width:2.5; fill:none}
.smap .vec4{stroke:var(--g4); stroke-width:2.5; fill:none}
.smap .arr1{fill:var(--g1)}
.smap .arr4{fill:var(--g4)}
.smap .axis{stroke:var(--line); stroke-width:1.5; fill:none}
.smap .pt{fill:var(--g4)}
.chip{display:inline-block; padding:1px 9px; border-radius:99px; font-size:11.5px; border:1px solid; margin:0 4px 4px 0; white-space:nowrap}
.chip.c1{background:var(--g1-soft); border-color:var(--g1)}
.chip.c2{background:var(--g2-soft); border-color:var(--g2)}
.chip.c3{background:var(--g3-soft); border-color:var(--g3)}
.chip.c4{background:var(--g4-soft); border-color:var(--g4)}
.chip.c5{background:var(--g5-soft); border-color:var(--g5)}

/* ---------- Reftable (kompakte Formel-Listen) ---------- */
.reftable{width:100%; border-collapse:collapse; margin:2px 0}
.reftable td{padding:7px 11px; border-bottom:1px solid var(--line); vertical-align:middle}
.reftable tr:last-child td{border-bottom:0}
.reftable td.lhs{white-space:nowrap; width:1%}
.reftable td.cond{color:var(--muted); font-size:12px; text-align:right; white-space:nowrap}

footer{max-width:1180px; margin:0 auto; padding:16px 18px; color:var(--muted); font-size:12px}
.kbd{font:12px/1 ui-monospace,Consolas,monospace; border:1px solid var(--line); border-bottom-width:2px; border-radius:6px; padding:2px 6px; background:var(--panel)}
@media (max-width:560px){ .search input{width:150px} }
</style>

<body>
<header>
  <div class="hwrap">
    <a class="brand" href="#/" style="text-decoration:none;color:inherit">

<footer>
  Übersicht <b>Lineare Algebra 2</b> (Eisermann · Stoll · Klapproth, SoSe 2026) ·
  Formeln offline via KaTeX · wird laufend erweitert.
</footer>

<script>
"use strict";

/* =========================================================================
   DATEN.  CATS = geordnete Liste aller Kategorien.
   Kategorie: { key, title, icon, g (Gruppe 1..4), tag, lead, blocks:[ {h, wide?, cards:[…]} ] }
   Karte:     { t:Titel, k?:Kürzel, def:Formel(sichtbar), worte:Worterklärung, bsp:Rechenbeispiel }
   Alle Text-/Formelfelder als String.raw (LaTeX in \( \) inline bzw. \[ \] display).
   ========================================================================= */
const GROUPS = {
  1:"Eigenwerttheorie & Normalformen",
  2:"Anwendung — Differentialgleichungen",
  3:"Skalarprodukte, Orthogonalität & Geometrie",
  4:"Affine, projektive & multilineare Strukturen"
};

const CATS = [

/* ==================== 0) OPERATOREN & DEFINITIONEN ==================== */
{ key:"operatoren", title:"Operatoren & Definitionen", icon:"∘", g:5,
  tag:"Transponierte, ⊕, ⊗, Dualraum, Hom, End … — Notation nachschlagen",
  lead:String.raw`Ein <b>Glossar</b> der Symbole und Operatoren aus Skript und Blättern: Was bedeutet \(A^{\mathsf T}\), \(U\oplus W\), \(V^{*}\), \(\operatorname{Hom}\), \(\otimes\)? Jeweils die knappe Definition, dazu <b>ausklappbar</b> eine Erklärung in einfachen Worten und ein kleines Beispiel. Die Grundrechenarten \(+,-,\cdot\) lassen wir bewusst weg — es geht um die weniger alltäglichen Operatoren.`,
  blocks:[
   { h:"Operatoren auf Matrizen & Abbildungen", cards:[
     { t:"Transponierte", k:"Aᵀ",
       def:String.raw`\[(A^{\mathsf T})_{ij}=A_{ji}\qquad\text{(Zeilen}\leftrightarrow\text{Spalten).}\]
         <table class="reftable">
         <tr><td class="lhs">\((A^{\mathsf T})^{\mathsf T}=A\)</td><td class="cond">zweimal = zurück</td></tr>
         <tr><td class="lhs">\((A+B)^{\mathsf T}=A^{\mathsf T}+B^{\mathsf T}\)</td><td class="cond">Summe</td></tr>
         <tr><td class="lhs">\((AB)^{\mathsf T}=B^{\mathsf T}A^{\mathsf T}\)</td><td class="cond">Reihenfolge dreht!</td></tr>
         <tr><td class="lhs">\((\lambda A)^{\mathsf T}=\lambda A^{\mathsf T}\)</td><td class="cond">Skalar</td></tr></table>`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Man kippt die Matrix an ihrer Hauptdiagonale — aus jeder Zeile wird eine Spalte und umgekehrt. Der Eintrag aus Zeile \(i\), Spalte \(j\) landet in Zeile \(j\), Spalte \(i\).</span>
         <span class="idea"><b>Wichtig:</b> Bei einem <b>Produkt</b> dreht sich beim Transponieren die Reihenfolge um — erst \(B^{\mathsf T}\), dann \(A^{\mathsf T}\).</span>`,
       bsp:String.raw`<div class="step"><b>Kippen:</b> \(A=\begin{pmatrix}1&2&3\\4&5&6\end{pmatrix}\ \Rightarrow\ A^{\mathsf T}=\begin{pmatrix}1&4\\2&5\\3&6\end{pmatrix}\) — jede Zeile wird eine Spalte.</div>
         <div class="step"><b>Reihenfolge dreht sich:</b> für \(A=\begin{pmatrix}1&2\\0&1\end{pmatrix},\ B=\begin{pmatrix}1&0\\3&1\end{pmatrix}\) ist \(AB=\begin{pmatrix}7&2\\3&1\end{pmatrix}\), also \((AB)^{\mathsf T}=\begin{pmatrix}7&3\\2&1\end{pmatrix}\).</div>
         <div class="step">Und tatsächlich \(B^{\mathsf T}A^{\mathsf T}=\begin{pmatrix}1&3\\0&1\end{pmatrix}\begin{pmatrix}1&0\\2&1\end{pmatrix}=\begin{pmatrix}7&3\\2&1\end{pmatrix}\) ✓ — gleiches Ergebnis, aber \(B\) zuerst.</div>` },

     { t:"Konjugiert-Transponierte (Adjungierte)", k:"A*",
       def:String.raw`\[A^{*}=\overline{A}^{\mathsf T},\qquad (A^{*})_{ij}=\overline{A_{ji}}.\]Transponieren <b>und</b> komplex konjugieren. Über \(\mathbb R\) ist \(A^{*}=A^{\mathsf T}\). Regeln: \((A^{*})^{*}=A\), \((AB)^{*}=B^{*}A^{*}\).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Wie transponieren, aber zusätzlich wird jeder Eintrag komplex konjugiert (Vorzeichen des Imaginärteils umdrehen). Bei reellen Matrizen ändert das Konjugieren nichts, dann ist es einfach die Transponierte.</span>
         <span class="idea"><b>Wozu:</b> Sie definiert, was „senkrecht" im Komplexen heißt — z.B. sind unitäre Matrizen genau die mit \(A^{*}A=I\).</span>`,
       bsp:String.raw`<div class="step">\(A=\begin{pmatrix}1&i\\2-i&3\end{pmatrix}\ \Rightarrow\ A^{*}=\begin{pmatrix}\overline{1}&\overline{2-i}\\\overline{i}&\overline{3}\end{pmatrix}=\begin{pmatrix}1&2+i\\-i&3\end{pmatrix}.\)</div>` },

     { t:"Inverse", k:"A⁻¹",
       def:String.raw`\[AA^{-1}=A^{-1}A=I,\qquad\text{existiert}\iff\det A\neq0.\]\((AB)^{-1}=B^{-1}A^{-1}\) (Reihenfolge dreht!). Für \(2\times2\): \(\begin{pmatrix}a&b\\c&d\end{pmatrix}^{-1}=\dfrac{1}{ad-bc}\begin{pmatrix}d&-b\\-c&a\end{pmatrix}.\)`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Die Inverse macht das, was \(A\) tut, wieder rückgängig — erst \(A\), dann \(A^{-1}\) ergibt zusammen die Identität \(I\).</span>
         <span class="idea"><b>Bedingung:</b> Nur invertierbar, wenn \(\det A\neq0\). Beim Produkt dreht sich die Reihenfolge wie beim Transponieren um.</span>`,
       bsp:String.raw`<div class="step">\(A=\begin{pmatrix}2&1\\1&1\end{pmatrix}\), \(\det A=2\cdot1-1\cdot1=1\).</div>
         <div class="step">\(A^{-1}=\dfrac{1}{1}\begin{pmatrix}1&-1\\-1&2\end{pmatrix}\). Probe: \(A A^{-1}=\begin{pmatrix}1&0\\0&1\end{pmatrix}=I\) ✓.</div>` },

     { t:"Spur", k:"tr",
       def:String.raw`\[\operatorname{tr}(A)=\sum_{i=1}^{n}a_{ii}\quad(\text{Summe der Diagonale}).\]\(\operatorname{tr}(AB)=\operatorname{tr}(BA)\), \(\operatorname{tr}(T^{-1}AT)=\operatorname{tr}(A)\), und \(\operatorname{tr}(A)=\sum_i\lambda_i\) (Summe der Eigenwerte).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Einfach die Zahlen auf der Diagonale zusammenzählen.</span>
         <span class="idea"><b>Warum praktisch:</b> Die Spur ändert sich bei Basiswechsel nicht und ist immer gleich der Summe aller Eigenwerte — ein schneller Kontrollwert.</span>`,
       bsp:String.raw`<div class="step">\(\operatorname{tr}\begin{pmatrix}1&5\\2&4\end{pmatrix}=1+4=5.\)</div>
         <div class="step">Eigenwerte hier: \(6\) und \(-1\), Summe \(6+(-1)=5\) ✓.</div>` },

     { t:"Kern & Bild", k:"Ker, Im",
       def:String.raw`\[\operatorname{Ker}(f)=\{v:\ f(v)=0\},\qquad \operatorname{Im}(f)=\{f(v):\ v\in V\}.\]<b>Rangsatz:</b> \(\dim\operatorname{Ker}f+\dim\operatorname{Im}f=\dim V.\)`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Der <b>Kern</b> sammelt alle Vektoren, die auf \(0\) abgebildet werden (was \(f\) „verschluckt"). Das <b>Bild</b> ist alles, was von \(f\) tatsächlich getroffen wird.</span>
         <span class="idea"><b>Merke:</b> Was im Kern an Dimension „verloren" geht, fehlt genau im Bild — zusammen ergeben sie die Dimension des Startraums.</span>`,
       bsp:String.raw`<div class="step">\(f(x,y,z)=(x,y,0)\) (Projektion). \(\operatorname{Ker}f=\{(0,0,z)\}=\langle e_3\rangle\) (die \(z\)-Achse wird zu \(0\)).</div>
         <div class="step">\(\operatorname{Im}f=\{(x,y,0)\}=\langle e_1,e_2\rangle\). Check: \(\dim\operatorname{Ker}+\dim\operatorname{Im}=1+2=3=\dim\mathbb R^3\) ✓.</div>` },

     { t:"Rang", k:"rang",
       def:String.raw`\[\operatorname{rang}(A)=\dim\operatorname{Im}(A)=\text{Zahl unabhängiger Spalten}=\text{Zahl unabhängiger Zeilen}.\]`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Wie viele Spalten (gleich viele wie Zeilen!) wirklich „neue Richtungen" liefern — der Rest ist Wiederholung. Am schnellsten mit Gauß: Zahl der Stufen (Pivots).</span>`,
       bsp:String.raw`<div class="step">\(\begin{pmatrix}1&2&3\\2&4&6\end{pmatrix}\): Zeile 2 \(=2\cdot\)Zeile 1 \(\Rightarrow\) nur eine unabhängige Zeile \(\Rightarrow\operatorname{rang}=1.\)</div>` },

     { t:"Adjunkte (komplementäre Matrix)", k:"adj",
       def:String.raw`\[A\cdot\operatorname{adj}(A)=\det(A)\,I,\qquad A^{-1}=\frac{1}{\det A}\operatorname{adj}(A).\]Einträge: \((\operatorname{adj}A)_{ij}=(-1)^{i+j}\det(A_{ji})\) (Kofaktoren, <b>transponiert</b>).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Man bildet zu jedem Platz die „Streichdeterminante" (Matrix ohne diese Zeile und Spalte) mit Schachbrett-Vorzeichen und transponiert das Ganze. Teilt man durch \(\det A\), bekommt man die Inverse — ganz ohne Gauß.</span>`,
       bsp:String.raw`<div class="step">\(2\times2\): \(\operatorname{adj}\begin{pmatrix}a&b\\c&d\end{pmatrix}=\begin{pmatrix}d&-b\\-c&a\end{pmatrix}.\)</div>
         <div class="step">\(A=\begin{pmatrix}2&1\\1&1\end{pmatrix}\Rightarrow\operatorname{adj}A=\begin{pmatrix}1&-1\\-1&2\end{pmatrix}\), und \(A\cdot\operatorname{adj}A=\begin{pmatrix}1&0\\0&1\end{pmatrix}=\det(A)\,I\) (hier \(\det A=1\)).</div>` },

     { t:"Determinante", k:"det",
       def:String.raw`Ordnet einer quadratischen Matrix eine <b>Zahl</b> zu; \(\det A\neq0\iff A\) invertierbar. \(\det(AB)=\det A\det B\), \(\det(A^{\mathsf T})=\det A\). Ausführliche Rechenwege: Kategorie <a href="#/ref/determinanten">Determinanten</a>.`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Eine einzige Kennzahl der Matrix. Sie misst u.a. das „Volumen-Verzerrungs-Faktor" der Abbildung und verrät sofort, ob die Matrix invertierbar ist (nämlich genau dann, wenn sie nicht \(0\) ist).</span>` },
   ]},

   { h:"Räume von Abbildungen", cards:[
     { t:"Hom(V,W) — lineare Abbildungen", k:"Hom",
       def:String.raw`\[\operatorname{Hom}_K(V,W)=\{f:V\to W\mid f\ \text{linear}\}.\]Selbst ein \(K\)-Vektorraum; \(\dim\operatorname{Hom}(V,W)=\dim V\cdot\dim W\); \(\operatorname{Hom}_K(V,W)\cong K^{m\times n}\).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Die Menge <b>aller</b> linearen Abbildungen von \(V\) nach \(W\). Ihre Elemente sind also selbst Abbildungen — mit der Bedingung, dass jede davon linear ist.</span>
         <span class="idea"><b>Clou:</b> Man kann zwei solche Abbildungen addieren und mit Skalaren strecken, deshalb ist \(\operatorname{Hom}\) selbst wieder ein Vektorraum (und entspricht den Matrizen).</span>`,
       bsp:String.raw`<div class="step">\(\operatorname{Hom}(\mathbb R^2,\mathbb R^3)\cong\mathbb R^{3\times2}\): jede lineare Abbildung \(\mathbb R^2\to\mathbb R^3\) ist eine \(3\times2\)-Matrix, also \(\dim=6\).</div>` },

     { t:"End(V) — Endomorphismen", k:"End",
       def:String.raw`\[\operatorname{End}_K(V)=\operatorname{Hom}_K(V,V).\]Nicht nur Vektorraum, sondern <b>Ring</b>: man kann verketten (\(g\circ f\)), Einselement ist \(\operatorname{id}_V\). Matrixbild: \(\operatorname{End}_K(K^n)\cong K^{n\times n}\).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Die linearen Abbildungen von \(V\) <b>in sich selbst</b> (Endo = „nach innen"). Weil Start- und Zielraum gleich sind, kann man sie hintereinanderausführen — daher ein Ring, nicht nur ein Vektorraum.</span>
         <span class="idea"><b>Warum wichtig:</b> Eigenwerte, Diagonalisieren, Jordan — all das lebt in \(\operatorname{End}(V)\).</span>`,
       bsp:String.raw`<div class="step">\(f,g\in\operatorname{End}(\mathbb R^2)\): sowohl \(f+g\) als auch \(g\circ f\) sind wieder in \(\operatorname{End}(\mathbb R^2)\). \(\operatorname{id}\) wirkt als „mal 1".</div>` },

     { t:"GL(V), GLₙ(K) — invertierbare", k:"GL",
       def:String.raw`\[\operatorname{GL}_n(K)=\{A\in K^{n\times n}\mid\det A\neq0\}.\]<b>Gruppe</b> unter Matrixmultiplikation (Produkt und Inverse bleiben invertierbar), aber <b>kein</b> Vektorraum (\(0\) fehlt).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Die <b>invertierbaren</b> unter den quadratischen Matrizen. „GL" = general linear group. Sie bilden eine Gruppe: hintereinander ausführen und rückgängig machen bleibt in der Menge.</span>`,
       bsp:String.raw`<div class="step">Basiswechsel-Matrizen \(T\) liegen in \(\operatorname{GL}_n(K)\); nur so ist \(T^{-1}AT\) überhaupt definiert.</div>` },

     { t:"Dualraum V*", k:"V*",
       def:String.raw`\[V^{*}=\operatorname{Hom}_K(V,K)\quad(\text{Linearformen}).\]\(\dim V^{*}=\dim V\); duale Basis \(b_i^{*}(b_j)=\delta_{ij}\). Mehr: Kategorie <a href="#/ref/dualtensor">Dualraum &amp; Tensorprodukt</a>.`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Der Dualraum von \(V\) enthält als Elemente <b>Abbildungen</b> — nämlich alle, die einem Vektor eine <b>Zahl</b> zuordnen (Linearformen). Bedingung: jede muss auf \(V\) linear sein.</span>
         <span class="idea"><b>Bild dazu:</b> Eine Linearform ist ein „Messgerät", das einen Vektor auf eine einzelne Zahl herunterbricht (z.B. „lies die erste Koordinate ab").</span>`,
       bsp:String.raw`<div class="step">\(\varphi(x_1,x_2)=3x_1-x_2\) ist linear, ordnet jedem Vektor eine Zahl zu \(\Rightarrow\varphi\in(\mathbb R^2)^{*}\).</div>
         <div class="step">Z.B. \(\varphi(2,1)=3\cdot2-1=5\).</div>` },

     { t:"Bidual V** & natürlicher Isomorphismus", k:"V**",
       def:String.raw`\[V^{**}=(V^{*})^{*},\qquad \iota_V:V\to V^{**},\ \iota_V(v)(\varphi)=\varphi(v).\]In endlicher Dimension ist \(\iota_V\) ein <b>kanonischer</b> Isomorphismus (ohne Basiswahl!): \(V\cong V^{**}\).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Der Dualraum vom Dualraum. Überraschung: \(V\) selbst steckt da ganz natürlich drin — ein Vektor \(v\) wird zur Vorschrift „setze mich in die Linearform ein".</span>
         <span class="idea"><b>Feiner Punkt:</b> \(V\cong V^{**}\) geht ohne Basiswahl (kanonisch), \(V\cong V^{*}\) dagegen nur mit gewählter Basis.</span>`,
       bsp:String.raw`<div class="step">Für \(v=(2,1)\) und \(\varphi(x)=3x_1-x_2\): \(\iota_V(v)(\varphi)=\varphi(v)=5\). Der Vektor „wertet die Form aus".</div>` },

     { t:"Verkettung, Identität, Einschränkung", k:"∘ id |",
       def:String.raw`\[(g\circ f)(v)=g(f(v)),\qquad \operatorname{id}_V(v)=v,\qquad f|_U:\ U\to W.\]\(f|_U\) ist \(f\), aber nur auf dem Teilraum \(U\) betrachtet.`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> <b>Verketten</b> heißt hintereinander ausführen — bei \(g\circ f\) zuerst \(f\), dann \(g\). Die <b>Identität</b> lässt jeden Vektor unverändert. Die <b>Einschränkung</b> \(f|_U\) schaut sich dieselbe Abbildung nur auf einem kleineren Bereich \(U\) an.</span>`,
       bsp:String.raw`<div class="step">\(f(x)=2x\), \(g(x)=x+1\): \((g\circ f)(x)=g(2x)=2x+1\), aber \((f\circ g)(x)=f(x+1)=2x+2\) — Reihenfolge zählt!</div>` },
   ]},

   { h:"Konstruktionen mit Vektorräumen", cards:[
     { t:"Summe & Direkte Summe", k:"U+W, U⊕W",
       def:String.raw`\[U+W=\{u+w:\ u\in U,\ w\in W\}.\]<b>Direkt</b> (\(U\oplus W\)) genau dann, wenn \(U\cap W=\{0\}\); dann ist \(\dim(U\oplus W)=\dim U+\dim W\) und jeder Vektor <b>eindeutig</b> zerlegbar. Allgemein: \(\dim(U+W)=\dim U+\dim W-\dim(U\cap W)\).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> \(U+W\) ist alles, was man als „ein Stück aus \(U\) plus ein Stück aus \(W\)" schreiben kann.</span>
         <span class="idea"><b>Was heißt direkt?</b> Wenn sich \(U\) und \(W\) nur in der \(0\) überschneiden, ist die Zerlegung jedes Vektors <b>eindeutig</b> — man schreibt dann \(U\oplus W\). Sonst gibt es mehrere Zerlegungen.</span>`,
       bsp:String.raw`<div class="step"><b>Direkt:</b> \(\mathbb R^2=\langle e_1\rangle\oplus\langle e_2\rangle\); jedes \((x,y)=x e_1+y e_2\) auf genau eine Weise.</div>
         <div class="step"><b>Nicht direkt:</b> \(U=\langle e_1,e_2\rangle,\ W=\langle e_2,e_3\rangle\) im \(\mathbb R^3\): \(U\cap W=\langle e_2\rangle\neq\{0\}\), also \(\dim(U+W)=2+2-1=3\) (kein \(\oplus\)).</div>` },

     { t:"Tensorprodukt V⊗W", k:"⊗",
       def:String.raw`\(V\otimes W\) mit <b>universeller Eigenschaft</b>: bilineare Abbildungen aus \(V\times W\) entsprechen genau linearen aus \(V\otimes W\). \(\dim(V\otimes W)=\dim V\cdot\dim W\); Erzeuger sind die einfachen Tensoren \(v\otimes w\). Mehr: <a href="#/ref/dualtensor">Dualraum &amp; Tensorprodukt</a>.`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Das Tensorprodukt „multipliziert" zwei Vektorräume zu einem größeren — die <b>Dimensionen multiplizieren</b> sich. Bausteine sind Produkte \(v\otimes w\); allgemeine Elemente sind Summen solcher Produkte.</span>
         <span class="idea"><b>Wozu:</b> Damit macht man aus einer Sache mit <b>zwei</b> Eingängen (bilinear) eine mit <b>einem</b> Eingang (linear).</span>`,
       bsp:String.raw`<div class="step">\(\dim(\mathbb R^2\otimes\mathbb R^2)=2\cdot2=4\), Basis \(e_1\otimes e_1,\ e_1\otimes e_2,\ e_2\otimes e_1,\ e_2\otimes e_2\).</div>` },

     { t:"Quotientenraum V/U", k:"V/U",
       def:String.raw`Elemente sind <b>Nebenklassen</b> \(v+U=\{v+u:\ u\in U\}\); \[\dim(V/U)=\dim V-\dim U.\]`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Man „setzt \(U\) auf null": zwei Vektoren gelten als <b>gleich</b>, wenn sie sich nur um etwas aus \(U\) unterscheiden. Übrig bleibt ein kleinerer Raum, in dem \(U\) zum Nullpunkt geworden ist.</span>`,
       bsp:String.raw`<div class="step">\(V=\mathbb R^2,\ U=\langle e_1\rangle\) (die \(x\)-Achse). In \(V/U\) zählt nur noch die \(y\)-Koordinate: \((3,7)\) und \((0,7)\) sind gleich. \(\dim(V/U)=2-1=1\).</div>` },

     { t:"Annullator U°", k:"U°",
       def:String.raw`\[U^{\circ}=\{\varphi\in V^{*}:\ \varphi|_U=0\},\qquad \dim U+\dim U^{\circ}=\dim V.\]`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Alle Linearformen, die auf ganz \(U\) den Wert \(0\) haben — die \(U\) also komplett „ignorieren". Das ist selbst ein Unterraum des Dualraums \(V^{*}\).</span>`,
       bsp:String.raw`<div class="step">\(V=\mathbb R^3,\ U=\langle e_1\rangle\): \(U^{\circ}=\langle e_2^{*},e_3^{*}\rangle\) (Formen, die die erste Koordinate nicht ansehen), \(\dim U^{\circ}=3-1=2\).</div>` },
   ]},

   { h:"Skalarprodukt & Geometrie", cards:[
     { t:"Skalarprodukt", k:"⟨·,·⟩",
       def:String.raw`\(\langle\cdot,\cdot\rangle:V\times V\to K\): (sesqui-)linear, symmetrisch bzw. hermitesch, <b>positiv definit</b> (\(\langle v,v\rangle>0\) für \(v\neq0\)). Standard: \(\langle x,y\rangle=\sum_i x_i y_i\) (reell) bzw. \(\sum_i\overline{x_i}y_i\) (komplex).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Ordnet <b>zwei</b> Vektoren eine Zahl zu und misst damit Länge und Winkel. Entscheidend: mit sich selbst kommt immer etwas Positives heraus (außer beim Nullvektor).</span>`,
       bsp:String.raw`<div class="step">\(\langle(1,2),(3,4)\rangle=1\cdot3+2\cdot4=11\). Und \(\langle(1,2),(1,2)\rangle=1+4=5>0\) ✓.</div>` },

     { t:"Norm", k:"‖·‖",
       def:String.raw`\[\|v\|=\sqrt{\langle v,v\rangle}\quad(\text{Länge}).\]Cauchy–Schwarz: \(|\langle v,w\rangle|\le\|v\|\,\|w\|\); Dreiecksungleichung: \(\|v+w\|\le\|v\|+\|w\|\).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Die <b>Länge</b> eines Vektors — die Wurzel aus seinem Skalarprodukt mit sich selbst. „Normiert" heißt Länge \(1\).</span>`,
       bsp:String.raw`<div class="step">\(\|(3,4)\|=\sqrt{3^2+4^2}=\sqrt{25}=5\).</div>` },

     { t:"Orthogonales Komplement U⊥", k:"U⊥",
       def:String.raw`\[U^{\perp}=\{v\in V:\ \langle v,u\rangle=0\ \text{für alle}\ u\in U\}.\]\(V=U\oplus U^{\perp}\) und \(\dim U+\dim U^{\perp}=\dim V\).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Alle Vektoren, die auf <b>ganz</b> \(U\) senkrecht stehen. Zusammen mit \(U\) füllt \(U^{\perp}\) den ganzen Raum lückenlos und überschneidungsfrei (direkte Summe).</span>`,
       bsp:String.raw`<div class="step">Im \(\mathbb R^3\) mit \(U=\langle e_1,e_2\rangle\) (die \(xy\)-Ebene) ist \(U^{\perp}=\langle e_3\rangle\) (die \(z\)-Achse).</div>` },

     { t:"Kronecker-Produkt A⊗B", k:"A⊗B",
       def:String.raw`Blockmatrix: jeder Eintrag \(a_{ij}\) wird durch \(a_{ij}B\) ersetzt. Es ist die <b>Matrix</b> des Abbildungs-Tensorprodukts \(f\otimes g\); Größe \((m p)\times(n q)\).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Die Matrix-Version von \(\otimes\): man ersetzt jeden Eintrag von \(A\) durch „dieser Eintrag mal die ganze Matrix \(B\)". So entsteht eine große Blockmatrix.</span>`,
       bsp:String.raw`\[\begin{pmatrix}1&0\\0&2\end{pmatrix}\otimes\begin{pmatrix}1&1\\1&1\end{pmatrix}=\begin{pmatrix}1&1&0&0\\1&1&0&0\\0&0&2&2\\0&0&2&2\end{pmatrix}.\]` },
   ]},

   { h:"Symbole & Relationen", cards:[
     { t:"Erzeugnis / Spann & Unterraum", k:"⟨…⟩, ≤",
       def:String.raw`\[\langle v_1,\dots,v_k\rangle=\Bigl\{\textstyle\sum_i\lambda_i v_i:\ \lambda_i\in K\Bigr\}\ =\ \text{kleinster Unterraum, der die }v_i\text{ enthält}.\]\(U\le V\) bedeutet: \(U\) ist Untervektorraum (enthält \(0\), abgeschlossen unter \(+\) und \(\cdot\)).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Der <b>Spann</b> ist alles, was man aus den gegebenen Vektoren durch Addieren und Strecken bauen kann. \(U\le V\) (Eisermanns Kurzschreibweise) heißt: \(U\) ist ein Vektorraum, der komplett in \(V\) liegt.</span>`,
       bsp:String.raw`<div class="step">\(\langle(1,0),(0,1)\rangle=\mathbb R^2\); \(\langle(1,1)\rangle\) ist nur die Gerade durch \((1,1)\).</div>` },

     { t:"Isomorphie & Ähnlichkeit", k:"≅, ∼",
       def:String.raw`\(V\cong W\): es gibt einen <b>bijektiven</b> linearen Isomorphismus (in endl. Dim. \(\iff\dim V=\dim W\)). \(A\sim B\): \(B=T^{-1}AT\) für ein \(T\in\operatorname{GL}_n(K)\).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> \(\cong\) heißt „im Wesentlichen derselbe Raum" (nur umbenannt). \(A\sim B\) heißt „<b>dieselbe</b> lineare Abbildung, nur in einer anderen Basis aufgeschrieben".</span>`,
       bsp:String.raw`<div class="step">\(\mathbb R^{2\times2}\cong\mathbb R^{4}\) (beide 4-dimensional). Und \(A\sim D\), wenn \(D\) die Diagonalform von \(A\) ist.</div>` },

     { t:"Teilbarkeit von Polynomen", k:"p ∣ q",
       def:String.raw`\(p\mid q\): es gibt ein Polynom \(r\) mit \(q=p\cdot r\) (Division <b>ohne Rest</b>). Zentrales Beispiel: \(\mu_A\mid\chi_A\) (Minimalpolynom teilt char. Polynom).`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> „\(p\) teilt \(q\)" heißt: \(q\) ist ein Vielfaches von \(p\), die Division geht glatt auf. Genau wie bei Zahlen, nur mit Polynomen.</span>`,
       bsp:String.raw`<div class="step">\((X-1)\mid(X^2-1)\), denn \(X^2-1=(X-1)(X+1)\).</div>` },

     { t:"Kleine Symbole", k:"δ, dim, deg, K[X], σ",
       def:String.raw`<table class="reftable">
         <tr><td class="lhs">\(\delta_{ij}=\begin{cases}1&i=j\\0&i\neq j\end{cases}\)</td><td class="cond">Kronecker-Delta</td></tr>
         <tr><td class="lhs">\(\dim_K V\)</td><td class="cond">Dimension (Zahl der Basisvektoren)</td></tr>
         <tr><td class="lhs">\(\deg p\)</td><td class="cond">Grad eines Polynoms</td></tr>
         <tr><td class="lhs">\(K[X]\)</td><td class="cond">Polynome über \(K\)</td></tr>
         <tr><td class="lhs">\(\sigma(A)\)</td><td class="cond">Spektrum = Menge der Eigenwerte</td></tr></table>`,
       worte:String.raw`<span class="idea"><b>In Worten:</b> Das <b>Kronecker-Delta</b> ist ein Schalter (1 bei gleichen Indizes, sonst 0). <b>dim</b> zählt Basisvektoren, <b>deg</b> den höchsten Exponenten, \(K[X]\) sind alle Polynome, und \(\sigma(A)\) ist einfach die Liste aller Eigenwerte.</span>`,
       bsp:String.raw`<div class="step">\(\delta_{22}=1,\ \delta_{12}=0\); \(\deg(X^3-2X)=3\); für \(A=\begin{pmatrix}1&2\\2&1\end{pmatrix}\) ist \(\sigma(A)=\{3,-1\}\).</div>` },
   ]}
  ]},

/* ==================== 0b) RÄUME & STRUKTUREN (Landkarte) ==================== */
{ key:"strukturen", title:"Räume & Strukturen", icon:"🧭", g:5,
  tag:"Gruppe · Ring · Körper · Vektorraum · Dualraum · affin — wer ist was?",
  lead:String.raw`Auf welchen <b>Objekten</b> rechnen wir hier eigentlich die ganze Zeit? Diese Seite ist die Landkarte: Was ist ein Körper, was ein Ring, was macht der Dualraum — und wie hängt das alles zusammen? Pro Objekt nur der Kern: <b>Was ist drin, was kann es, wofür braucht man es.</b> Die Rechen-Details stehen in den Fach-Kategorien; hier geht es um den Überblick.`,
  blocks:[

   { h:"Die große Landkarte", wide:true, cards:[
     { t:"Alles auf einen Blick", k:"Landkarte",
       def:String.raw`<p><b>Von den Zahlen zu den Räumen:</b> oben wird das Rechnen stufenweise aufgebaut (Gruppe → Ring → Körper), in der Mitte entsteht daraus der Vektorraum, und unten steht alles, was man aus \(V\) baut. Jede Box hat weiter unten ihre eigene Karte.</p>

</svg></div>
<p><b>Farbcode:</b> <span class="chip c4">Zahlen-Strukturen</span><span class="chip c1">Vektorraum</span><span class="chip c2">Abbildungsräume</span><span class="chip c3">Dual-Welt</span><span class="chip c5">weitere Konstruktionen</span></p>`,
       worte:String.raw`<span class="idea"><b>Oben — die Zahlen-Welt:</b> Gruppe (eine Verknüpfung), Ring (zwei Verknüpfungen), Körper (zwei Verknüpfungen + Teilen). Jede Stufe erbt alles von der vorigen und legt eine Fähigkeit drauf. Der Körper liefert die <b>Skalare</b>.</span>
<span class="idea"><b>Mitte — der Vektorraum:</b> keine Zauberei, sondern ein Bausatz: eine abelsche Gruppe \((V,+)\) für die Vektoren plus ein Körper \(K\) für die Skalare.</span>
<span class="idea"><b>Unten — aus \(V\) gebaut:</b> die Abbildungsräume \(\operatorname{Hom}\to\operatorname{End}\to\operatorname{GL}\) (immer speziellere Abbildungen) — und der Dualraum ist nichts Exotisches, sondern einfach \(\operatorname{Hom}(V,K)\). Nochmal dualisieren gibt \(V^{**}\), und das ist (kanonisch) wieder \(V\).</span>
<span class="idea"><b>Der Kreis schließt sich:</b> \(\operatorname{Hom}\) ist selbst ein Vektorraum, \(\operatorname{End}\) ein Ring, \(\operatorname{GL}\) eine Gruppe — die Strukturen von oben tauchen bei den Abbildungen wieder auf.</span>` },
   ]},

   { h:"Die Zahlen-Welt: Gruppe → Ring → Körper", cards:[
     { t:"Gruppe", k:"(G, ∘)",
       def:String.raw`<span class="idea"><b>Macht:</b> genau <b>eine</b> Verknüpfung \(\circ\) — und jede Aktion lässt sich <b>rückgängig machen</b>.</span>
<span class="idea"><b>Enthält:</b> irgendwelche Elemente (Zahlen, Matrizen, Drehungen …). Regeln: \(a\circ b\) bleibt in der Menge, Klammern egal (assoziativ), es gibt ein neutrales Element und zu jedem \(a\) ein Inverses \(a^{-1}\).</span>
<span class="idea"><b>Braucht man für:</b> Gleichungen lösen: \(a\circ x=b\ \Rightarrow\ x=a^{-1}\circ b\). Und: der \(+\)-Teil jedes Vektorraums ist eine (abelsche) Gruppe.</span>
<span class="idea"><b>Beispiele:</b> \((\mathbb Z,+)\), \((\mathbb R\setminus\{0\},\cdot)\), \(\operatorname{GL}_n(K)\), Drehungen der Ebene.</span>`,
       worte:String.raw`<span class="idea"><b>Denkbild:</b> eine Gruppe ist eine Sammlung von Aktionen, die man ausführen und wieder rückgängig machen kann — Drehen und Zurückdrehen, Addieren und Subtrahieren.</span>
<span class="idea"><b>abelsch</b> heißt: Reihenfolge egal (\(a\circ b=b\circ a\)). Vektoraddition: abelsch. Matrixmultiplikation: nicht! (\(AB\neq BA\) im Allgemeinen.)</span>`,
       bsp:String.raw`<div class="step"><b>Gruppe:</b> \((\mathbb Z,+)\) — neutral ist \(0\), das Inverse von \(5\) ist \(-5\).</div>
<div class="step"><b>Keine Gruppe:</b> \((\mathbb Z,\cdot)\) — das Inverse von \(2\) wäre \(\tfrac12\), liegt aber nicht in \(\mathbb Z\).</div>
<div class="step"><b>Nicht abelsch:</b> \(\operatorname{GL}_2(\mathbb R)\) — Produkt und Inverse invertierbarer Matrizen bleiben invertierbar (\((AB)^{-1}=B^{-1}A^{-1}\)), aber die Reihenfolge zählt.</div>` },

     { t:"Ring", k:"(R, +, ·)",
       def:String.raw`<span class="idea"><b>Macht:</b> <b>zwei</b> Verknüpfungen: \(+\) und \(\cdot\). Plus, Minus, Mal gehen immer — nur <b>Teilen ist nicht versprochen</b>.</span>
<span class="idea"><b>Enthält:</b> Dinge, mit denen man „wie mit ganzen Zahlen" rechnet: \((R,+)\) ist eine abelsche Gruppe, \(\cdot\) ist assoziativ, beides verbindet das Distributivgesetz.</span>
<span class="idea"><b>Braucht man für:</b> Polynome \(K[X]\) (→ charakteristisches Polynom, Minimalpolynom) und Matrizen \(K^{n\times n}\) — beides Ringe, keine Körper. Genau deshalb darf man Matrizen nicht einfach „teilen".</span>
<span class="idea"><b>Beispiele:</b> \(\mathbb Z\), \(K[X]\), \(K^{n\times n}\), \(\operatorname{End}_K(V)\).</span>`,
       worte:String.raw`<span class="idea"><b>Denkbild:</b> Ring = Rechnen ohne Bruchstrich. In \(\mathbb Z\) kann man wunderbar rechnen, aber \(3x=1\) hat keine Lösung.</span>
<span class="idea"><b>Achtung Nullteiler:</b> bei Matrizen kann \(AB=0\) sein, obwohl \(A,B\neq0\) — deshalb ist Kürzen verboten. Und \(\cdot\) muss nicht kommutativ sein.</span>`,
       bsp:String.raw`<div class="step"><b>Nullteiler:</b> \(A=\begin{pmatrix}0&1\\0&0\end{pmatrix}\neq0\), aber \(A^{2}=0\). In einem Körper unmöglich!</div>
<div class="step"><b>Warum das zählt:</b> weil \(K^{n\times n}\) ein Ring ist, kann man Polynome an Matrizen auswerten: \(p(X)=X^2-1\ \Rightarrow\ p(A)=A^2-I\). Darauf baut ganz Cayley–Hamilton.</div>` },

     { t:"Körper", k:"K",
       def:String.raw`<span class="idea"><b>Macht:</b> alle vier Grundrechenarten: \(+,\ -,\ \cdot,\ \div\) (durch alles außer \(0\)), und \(\cdot\) ist kommutativ.</span>
<span class="idea"><b>Enthält:</b> die „Zahlen", mit denen gestreckt wird — die <b>Skalare</b> jedes Vektorraums.</span>
<span class="idea"><b>Braucht man für:</b> jeden Vektorraum (die \(\lambda\) in \(\lambda v\) kommen aus \(K\)) und für Gauß: ohne Teilen kein Pivot-Normieren.</span>
<span class="idea"><b>Beispiele:</b> \(\mathbb Q,\ \mathbb R,\ \mathbb C,\ \mathbb F_2=\{0,1\}\). <b>Kein</b> Körper: \(\mathbb Z\) (÷ fehlt).</span>`,
       worte:String.raw`<span class="idea"><b>Denkbild:</b> Körper = Ring de luxe — Teilen inklusive.</span>
<span class="idea"><b>Warum der Körper eine Rolle spielt:</b> über \(\mathbb R\) zerfällt \(X^2+1\) nicht, über \(\mathbb C\) schon — deshalb hat über \(\mathbb C\) jede Matrix Eigenwerte, über \(\mathbb R\) nicht unbedingt. Und \(\mathbb F_2\) zeigt: „Zahlen" müssen nicht die gewohnten sein.</span>`,
       bsp:String.raw`<div class="step"><b>Exotisch, aber Körper:</b> \(\mathbb F_2=\{0,1\}\) mit \(1+1=0\) (also \(-1=1\)).</div>
<div class="step"><b>Körper entscheidet über Eigenwerte:</b> die Drehmatrix \(\begin{pmatrix}0&-1\\1&0\end{pmatrix}\) hat \(\chi(\lambda)=\lambda^2+1\) — über \(\mathbb R\) keine Eigenwerte, über \(\mathbb C\) die Eigenwerte \(\pm i\).</div>` },

     { t:"Merkhilfe: Wer darf was?", k:"Spickzettel",
       def:String.raw`<table class="reftable">
<tr><td class="lhs"><b>Gruppe</b> \((G,\circ)\)</td><td>eine Verknüpfung + Umkehren</td><td class="cond">\((\mathbb Z,+)\), \(\operatorname{GL}_n(K)\)</td></tr>
<tr><td class="lhs"><b>Ring</b> \((R,+,\cdot)\)</td><td>\(+\ \ -\ \ \cdot\) — ohne \(\div\)</td><td class="cond">\(\mathbb Z\), \(K[X]\), \(K^{n\times n}\)</td></tr>
<tr><td class="lhs"><b>Körper</b> \(K\)</td><td>\(+\ \ -\ \ \cdot\ \ \div\)</td><td class="cond">\(\mathbb Q,\ \mathbb R,\ \mathbb C,\ \mathbb F_p\)</td></tr>
<tr><td class="lhs"><b>Vektorraum</b> \(V\)</td><td>\(v+w\) und \(\lambda v\) mit \(\lambda\in K\)</td><td class="cond">\(K^n\), Polynome, …</td></tr>
</table>
<p><b>Merksatz:</b> Das \(\div\) ist der ganze Unterschied zwischen Ring und Körper. Und ein Vektorraum ist „abelsche Gruppe + Skalare aus einem Körper".</p>` },
   ]},

   { h:"Vektorräume — die Hauptbühne", cards:[
     { t:"Vektorraum", k:"V über K",
       def:String.raw`<span class="idea"><b>Macht:</b> genau zwei Dinge: Vektoren <b>addieren</b> (\(v+w\)) und mit Skalaren <b>strecken</b> (\(\lambda v\), \(\lambda\in K\)). Mehr nicht — kein Produkt von Vektoren, keine Länge, keine Winkel (die kommen erst mit dem Skalarprodukt dazu).</span>
<span class="idea"><b>Enthält:</b> „Vektoren" — das können Pfeile in \(K^n\) sein, aber genauso Polynome, Matrizen, Funktionen, sogar lineare Abbildungen.</span>
<span class="idea"><b>Zutaten:</b> eine abelsche Gruppe \((V,+)\) und ein Körper \(K\), verträglich verheiratet: \(\lambda(v+w)=\lambda v+\lambda w\) usw.</span>
<span class="idea"><b>Braucht man für:</b> … alles hier. Lineare Algebra <i>ist</i> die Theorie der Vektorräume.</span>`,
       worte:String.raw`<span class="idea"><b>Der Clou:</b> „Vektor" beschreibt kein Aussehen, sondern ein <b>Verhalten</b>. Alles, was sich addieren und strecken lässt, zählt als Vektor — deshalb übertragen sich Basis, Dimension, Eigenwerte 1:1 auf Polynome, Matrizen und Funktionen.</span>`,
       bsp:String.raw`<div class="step"><b>Polynome vom Grad \(\le2\):</b> Basis \((1,\ X,\ X^2)\), also \(\dim=3\). Addieren &amp; strecken: \((2X^2+3)+(X^2-X)=3X^2-X+3\) ✓ — verhält sich exakt wie \(\mathbb R^3\).</div>
<div class="step"><b>Matrizen \(2\times2\):</b> \(\dim=4\), Basis sind die vier Matrizen mit genau einer \(1\). Deshalb \(\mathbb R^{2\times2}\cong\mathbb R^4\).</div>` },

     { t:"Unterraum, Summe, Quotient — Baustellen in V", k:"U ≤ V",
       def:String.raw`<span class="idea"><b>Unterraum \(U\le V\):</b> eine Teilmenge, die selbst ein Vektorraum ist — enthält die \(0\), und \(+\) sowie \(\lambda\cdot\) führen nicht hinaus. Bild: Geraden und Ebenen <b>durch den Ursprung</b>.</span>
<span class="idea"><b>Daraus baut man:</b> die Summe \(U+W\), die direkte Summe \(U\oplus W\) (Zerlegung ohne Überlappung — das Werkzeug hinter Eigenraum-Zerlegungen) und den Quotienten \(V/U\) („\(U\) wird für null erklärt").</span>
<span class="idea"><b>Details &amp; Beispiele:</b> in <a href="#/ref/operatoren">Operatoren &amp; Definitionen</a>.</span>`,
       worte:String.raw`<span class="idea"><b>Warum wichtig:</b> praktisch jedes Objekt der Vorlesung ist ein Unterraum von irgendwas — Eigenräume, Kerne, Bilder, Annullatoren, orthogonale Komplemente.</span>`,
       bsp:String.raw`<div class="step"><b>Unterraum:</b> \(\langle(1,1,0)\rangle\subset\mathbb R^3\) — Gerade durch \(0\) ✓.</div>
<div class="step"><b>Kein Unterraum:</b> die Gerade durch \((1,0)\) und \((0,1)\) — sie enthält die \(0\) nicht. (Das ist ein <b>affiner</b> Teilraum → unten.)</div>` },
   ]},

   { h:"Dualraum & Bidualraum — die Messgeräte", cards:[
     { t:"Dualraum", k:"V* = Hom(V, K)",
       def:String.raw`<span class="idea"><b>Macht:</b> Vektoren <b>messen</b>: Vektor rein, Zahl raus.</span>
<span class="idea"><b>Enthält:</b> keine Vektoren, sondern <b>Abbildungen</b> — alle linearen \(\varphi:V\to K\) („Linearformen"). Ist selbst wieder ein Vektorraum, in endlicher Dimension mit \(\dim V^{*}=\dim V\).</span>
<span class="idea"><b>Braucht man für:</b> Koordinaten ablesen (duale Basis \(b_i^{*}\)), den Annullator \(U^{\circ}\) — und das Zeilen-mal-Spalte-Denken: <b>Zeilenvektoren sind Elemente von \(V^{*}\)</b>.</span>
<span class="idea"><b>Rechnen damit:</b> <a href="#/ref/dualtensor">Dualraum &amp; Tensorprodukt</a>.</span>`,
       worte:String.raw`<span class="idea"><b>Merkbild „Messgerät":</b> \(\varphi(x)=3x_1-x_2\) ist ein Messgerät — es bricht jeden Vektor auf eine einzige Zahl herunter.</span>
<span class="idea"><b>Matrix-Sicht:</b> Spaltenvektor = Element von \(V\); Zeilenvektor (eine \(1\times n\)-Matrix) = Element von \(V^{*}\). Zeile mal Spalte = \(1\times1\) = Zahl — genau das <i>ist</i> das Anwenden einer Linearform.</span>`,
       bsp:String.raw`<div class="step">\(\varphi(x)=3x_1-x_2\): \(\ \varphi(2,1)=3\cdot2-1=5\). Als Matrizen: \(\begin{pmatrix}3&-1\end{pmatrix}\begin{pmatrix}2\\1\end{pmatrix}=5\).</div>
<div class="step"><b>Duale Standardbasis:</b> \(e_1^{*}(x)=x_1\), \(e_2^{*}(x)=x_2\) — die Koordinaten-Ablesegeräte. Jede Linearform ist eine Kombination davon: \(\varphi=3e_1^{*}-e_2^{*}\).</div>` },

     { t:"Bidualraum", k:"V** = (V*)*",
       def:String.raw`<span class="idea"><b>Macht:</b> misst die Messgeräte: Elemente von \(V^{**}\) fressen Linearformen und liefern Zahlen.</span>
<span class="idea"><b>Der Clou:</b> jeder Vektor \(v\) <i>ist</i> schon so ein Ding — als Vorschrift „setz mich ein": \(\iota(v)(\varphi)=\varphi(v)\).</span>
<span class="idea"><b>In endlicher Dimension:</b> \(\iota:V\to V^{**}\) ist ein Isomorphismus, und zwar <b>kanonisch</b> — ganz ohne Basiswahl. \(V\cong V^{*}\) gilt zwar auch (gleiche Dimension), aber nur mit gewählter Basis.</span>
<span class="idea"><b>Braucht man für:</b> den feinen Unterschied „natürlich vs. basisabhängig" — und um zu sehen, warum die Dualisiererei nach zwei Schritten nichts Neues mehr bringt.</span>`,
       worte:String.raw`<span class="idea"><b>Denkbild:</b> der Spiegel im Spiegel zeigt wieder das Original. Einmal dualisieren: neuer Raum. Zweimal: auf natürliche Weise wieder \(V\).</span>
<span class="idea"><b>Deshalb hört das Spiel auf:</b> \(V^{***}=(V^{**})^{*}\cong V^{*}\) — ab \(V^{**}\) dreht man sich im Kreis.</span>`,
       bsp:String.raw`<div class="step">\(v=(2,1)\), \(\varphi(x)=3x_1-x_2\): \(\ \iota(v)(\varphi)=\varphi(v)=5\). \(\iota(v)\) ist die Abbildung „werte alles bei \((2,1)\) aus".</div>
<div class="step"><b>Bonus:</b> unter \(\iota\) entspricht der Doppel-Annullator \(U^{\circ\circ}\) wieder \(U\) selbst — das Bild rastet perfekt ein.</div>` },
   ]},

   { h:"Das Spiegel-Spiel im Bild", wide:true, cards:[
     { t:"V → V* → V**", k:"ι: V ≅ V**",
       def:String.raw`<p>Jede Stufe ist dasselbe Rezept: „nimm alle linearen Abbildungen der vorigen Stufe nach \(K\)". Nach zwei Stufen ist man — kanonisch — wieder zu Hause:</p>
<div class="smap"><svg viewBox="0 0 880 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kette V nach V-Stern nach V-Doppelstern mit kanonischem Isomorphismus">
<defs><marker id="chainArr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" class="arr"/></marker></defs>
<rect x="410" y="6" width="52" height="30" rx="8" class="b4"/>
<text x="436" y="27" text-anchor="middle" class="t">K</text>
<path d="M435 60 V40" class="fl" marker-end="url(#chainArr)"/>
<text x="446" y="52" class="lab">φ(v) — eine Zahl</text>
<rect x="30" y="60" width="230" height="120" rx="12" class="b1"/>
<text x="145" y="92" text-anchor="middle" class="t">V — Vektorraum</text>
<text x="145" y="118" text-anchor="middle" class="m">Elemente: Vektoren v</text>
<text x="145" y="142" text-anchor="middle" class="s">z.B. v = (2, 1)</text>
<path d="M262 120 H316" class="fl" marker-end="url(#chainArr)"/>
<text x="289" y="110" text-anchor="middle" class="lab">Hom(·, K)</text>
<rect x="320" y="60" width="230" height="120" rx="12" class="b3"/>
<text x="435" y="92" text-anchor="middle" class="t">V* — Dualraum</text>
<text x="435" y="118" text-anchor="middle" class="m">Messgeräte φ: V → K</text>
<text x="435" y="142" text-anchor="middle" class="s">z.B. φ(x) = 3x₁ − x₂</text>
<path d="M552 120 H606" class="fl" marker-end="url(#chainArr)"/>
<text x="579" y="110" text-anchor="middle" class="lab">nochmal *</text>
<rect x="610" y="60" width="240" height="120" rx="12" class="b3"/>
<text x="730" y="92" text-anchor="middle" class="t">V** — Bidualraum</text>
<text x="730" y="118" text-anchor="middle" class="m">misst die Messgeräte</text>
<text x="730" y="142" text-anchor="middle" class="s">ι(v): φ ↦ φ(v) — „setz v ein!“</text>
<path d="M145 182 V220 H730 V186" class="fl dash" marker-end="url(#chainArr)"/>
<text x="437" y="212" text-anchor="middle" class="lab">ι: V ≅ V** — kanonischer Isomorphismus (endl. Dim.), ganz ohne Basiswahl</text>
</svg></div>`,
       worte:String.raw`<span class="idea"><b>So liest du es:</b> \(V^{*}\) entsteht aus \(V\) durch „alle Messgeräte sammeln". Dasselbe Rezept auf \(V^{*}\) angewendet gibt \(V^{**}\) — aber statt etwas Neuem findet man dort (kanonisch verpackt) wieder die Vektoren von \(V\): jeder Vektor \(v\) wirkt als „setz mich ein"-Vorschrift \(\varphi\mapsto\varphi(v)\).</span>
<span class="idea"><b>Der gestrichelte Pfeil</b> ist der Grund, warum man \(V\) und \(V^{**}\) in endlicher Dimension bedenkenlos identifizieren darf — es gibt keine willkürliche Wahl darin.</span>` },
   ]},

   { h:"Abbildungen: homo · endo · iso · auto", wide:true, cards:[
     { t:"Der Namens-Decoder", k:"Hom, End, Iso, Aut",
       def:String.raw`<p>Alle vier sind <b>lineare Abbildungen</b> — die Vorsilbe sagt nur, <i>wohin</i> sie gehen und <i>ob man sie umkehren</i> kann:</p>

<text x="160" y="128" text-anchor="end" class="s">(Struktur bleibt heil)</text>
<rect x="180" y="70" width="280" height="90" rx="10" class="b2"/>
<text x="320" y="100" text-anchor="middle" class="t">Homomorphismus</text>
<text x="320" y="122" text-anchor="middle" class="m">f ∈ Hom(V, W)</text>
<text x="320" y="144" text-anchor="middle" class="s">der Normalfall</text>
<rect x="470" y="70" width="280" height="90" rx="10" class="b2"/>
<text x="610" y="100" text-anchor="middle" class="t">Endomorphismus</text>
<text x="610" y="122" text-anchor="middle" class="m">f ∈ End(V)</text>
<text x="610" y="144" text-anchor="middle" class="s">verkettbar: f ∘ f geht!</text>
<text x="160" y="203" text-anchor="end" class="t">linear + bijektiv</text>
<text x="160" y="221" text-anchor="end" class="s">(umkehrbar)</text>
<rect x="180" y="170" width="280" height="90" rx="10" class="b1"/>
<text x="320" y="200" text-anchor="middle" class="t">Isomorphismus</text>
<text x="320" y="222" text-anchor="middle" class="m">f umkehrbar ⇒ V ≅ W</text>
<text x="320" y="244" text-anchor="middle" class="s">„gleicher Raum, andere Namen“</text>
<rect x="470" y="170" width="280" height="90" rx="10" class="b5"/>
<text x="610" y="200" text-anchor="middle" class="t">Automorphismus</text>
<text x="610" y="222" text-anchor="middle" class="m">f ∈ GL(V)</text>
<text x="610" y="244" text-anchor="middle" class="s">= endo + iso — bildet eine Gruppe</text>
</svg></div>
<p><b>Merke:</b> auto = endo + iso. Und „-morphismus" heißt immer nur: die Abbildung respektiert die Struktur, hier also \(f(v+w)=f(v)+f(w)\) und \(f(\lambda v)=\lambda f(v)\).</p>`,
       worte:String.raw`<span class="idea"><b>Vorsilben-Griechisch:</b> <b>homo-</b> „gleichartig" (Struktur bleibt erhalten) · <b>endo-</b> „nach innen" (Ziel = Start) · <b>iso-</b> „gleich" (umkehrbar — beide Räume sind strukturell identisch) · <b>auto-</b> „selbst" (nach innen <i>und</i> umkehrbar).</span>
<span class="idea"><b>Warum „iso" so mächtig ist:</b> \(V\cong W\) heißt „bis auf Umbenennung derselbe Raum". Deshalb darf man jeden \(n\)-dimensionalen \(K\)-Vektorraum wie \(K^n\) behandeln — Koordinaten sind nichts anderes als so ein Isomorphismus.</span>`,
       bsp:String.raw`<div class="step"><b>Auto:</b> \(f(x,y)=(2x,\ x+y)\) auf \(\mathbb R^2\): Matrix \(\begin{pmatrix}2&0\\1&1\end{pmatrix}\), \(\det=2\neq0\) — Endomorphismus und umkehrbar, also Automorphismus.</div>
<div class="step"><b>Iso zwischen verschiedenen Räumen:</b> Polynome vom Grad \(\le1\to\mathbb R^2\), \(p\mapsto(p(0),\,p(1))\) — linear und bijektiv, also \(K[X]_{\le1}\cong\mathbb R^2\).</div>
<div class="step"><b>Endo, aber kein Auto:</b> das Ableiten \(p\mapsto p'\) auf Polynomen vom Grad \(\le2\) — linear, bleibt im Raum, aber alle Konstanten landen auf \(0\) (nicht injektiv).</div>` },

     { t:"Plot-Twist: Abbildungen bilden selbst Strukturen", k:"Hom = VR · End = Ring · GL = Gruppe",
       def:String.raw`<span class="idea"><b>\(\operatorname{Hom}(V,W)\)</b> ist selbst ein <b>Vektorraum</b>: Abbildungen kann man addieren und strecken. \(\dim=\dim V\cdot\dim W\).</span>
<span class="idea"><b>\(\operatorname{End}(V)\)</b> ist sogar ein <b>Ring</b>: das Verketten \(g\circ f\) spielt „mal". (Teilen? Nicht immer — genau wie bei Matrizen.)</span>
<span class="idea"><b>\(\operatorname{GL}(V)\)</b> — die Umkehrbaren in \(\operatorname{End}(V)\) — ist eine <b>Gruppe</b>: hier lebt der Basiswechsel \(T^{-1}AT\).</span>
<span class="idea"><b>Und \(V^{*}=\operatorname{Hom}(V,K)\)</b> ist der Spezialfall \(W=K\): der Dualraum ist ein Abbildungsraum.</span>`,
       worte:String.raw`<span class="idea"><b>Der Kreis schließt sich:</b> die Treppe Gruppe–Ring–Vektorraum von oben taucht bei den Abbildungen wieder auf — nur dass die Elemente jetzt Abbildungen sind statt Zahlen. Genau deshalb darf man mit Matrizen „rechnen wie mit Zahlen, nur ohne ÷ und ohne Vertauschen": \(\operatorname{End}_K(K^n)\) und \(K^{n\times n}\) sind derselbe Ring.</span>`,
       bsp:String.raw`<div class="step"><b>Wörterbuch</b> für \(f,g\in\operatorname{End}(\mathbb R^2)\) mit Matrizen \(A,B\): \(\ f+g\leftrightarrow A+B\), \(\ g\circ f\leftrightarrow BA\), \(\ \operatorname{id}\leftrightarrow I\), „umkehrbar" \(\leftrightarrow\det\neq0\).</div>` },
   ]},

   { h:"Affin — Geometrie ohne Ursprung", wide:true, cards:[
     { t:"Affiner Raum — Punkte statt Pfeile", k:"P + v",
       def:String.raw`<span class="idea"><b>Macht:</b> Geometrie <b>ohne Nullpunkt</b> — kein Punkt ist ausgezeichnet.</span>
<span class="idea"><b>Enthält:</b> <b>Punkte</b>, und im Hintergrund einen Vektorraum \(V\) der <b>Verschiebungen</b>: zu Punkten \(P,Q\) gehört der Vektor \(\overrightarrow{PQ}=Q-P\in V\), und Punkt + Vektor = Punkt.</span>
<span class="idea"><b>Braucht man für:</b> Geraden und Ebenen, die <b>nicht</b> durch \(0\) gehen; Lösungsmengen \(x_p+\operatorname{Ker}A\) von \(Ax=b\); die ganze Geometrie in <a href="#/ref/affin">Affine &amp; projektive Räume</a>.</span>
<div class="smap"><svg viewBox="0 0 880 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vergleich: Vektorraum mit Ursprung, affiner Raum nur mit Punkten">

<text x="647" y="106" text-anchor="middle" class="lab">Q − P: ein Vektor aus V</text>
<text x="660" y="260" text-anchor="middle" class="s">Punkte kann man nicht addieren — aber ihre Differenz ist ein Vektor</text>
</svg></div>`,
       worte:String.raw`<span class="idea"><b>Punkt vs. Vektor:</b> Punkte sind <b>Orte</b> („wo bin ich"), Vektoren sind <b>Verschiebungen</b> („wie komme ich von \(P\) nach \(Q\)"). Im Vektorraum fällt beides zusammen, weil jeder Punkt der Pfeil vom Ursprung dorthin ist. Im affinen Raum wirft man den Ursprung weg — übrig bleiben Orte plus Verschiebungen.</span>
<span class="idea"><b>Verbotene Rechnung:</b> \(P+Q\) (zwei Orte addieren) ergibt keinen Sinn. Erlaubt: \(Q-P\) (Verschiebung) und \(P+v\) (Ort verschieben).</span>`,
       bsp:String.raw`<div class="step"><b>Klassiker:</b> die Lösungsmenge von \(x_1+x_2=1\) in \(\mathbb R^2\) — die Gerade durch \((1,0)\) und \((0,1)\). Sie enthält die \(0\) nicht, ist also <b>kein</b> Unterraum.</div>
<div class="step">Aber: <b>Aufpunkt + Richtungsraum</b> funktioniert: \(\{(1,0)+t\,(1,-1):\ t\in\mathbb R\}=(1,0)+\langle(1,-1)\rangle\) — ein affiner Teilraum. Genau die Struktur \(x_p+\operatorname{Ker}A\) jeder Lösungsmenge von \(Ax=b\).</div>` },

     { t:"Affine Abbildung — linear + Verschiebung", k:"f(x) = Ax + b",
       def:String.raw`<span class="idea"><b>Macht:</b> erst linear verzerren, dann verschieben: \(f(x)=Ax+b\). Linear ist der Spezialfall \(b=0\).</span>
<span class="idea"><b>Erhält:</b> Geraden (sie gehen auf Geraden — oder auf Punkte, falls \(A\) nicht injektiv ist) und <b>Teilverhältnisse</b> (der Mittelpunkt bleibt der Mittelpunkt) — aber nicht unbedingt Längen oder Winkel.</span>
<span class="idea"><b>Braucht man für:</b> Drehungen um beliebige Punkte, Spiegelungen an beliebigen Geraden, Fixpunkte von Affinitäten — und die Hauptachsentransformation von <a href="#/ref/quadriken">Quadriken</a>.</span>`,
       worte:String.raw`<span class="idea"><b>Warum „linear" nicht reicht:</b> jede lineare Abbildung muss \(0\) auf \(0\) schicken (\(f(0)=A\cdot0=0\)) — eine Drehung um einen anderen Punkt kann also nicht linear sein. Affin = linear plus Verschieben erlaubt.</span>
<span class="idea"><b>Schnelltest:</b> \(f\) ist affin \(\iff\) \(x\mapsto f(x)-f(0)\) ist linear. Beispiel: \(x\mapsto x+b\) ist <b>nicht</b> linear (für \(b\neq0\)), aber affin.</span>`,
       bsp:String.raw`<p><b>Drehung um 90° um den Punkt \((1,0)\)</b> statt um den Ursprung:</p>
<div class="step">Rezept „hin – drehen – zurück": \(f(x)=R\,(x-(1,0))+(1,0)\) mit \(R=\begin{pmatrix}0&-1\\1&0\end{pmatrix}\). Ausmultipliziert: \(f(x)=Rx+b\) mit \(b=(1,0)-R\,(1,0)=(1,0)-(0,1)=(1,-1)\).</div>
<div class="step"><b>Fixpunkt-Probe:</b> \(f\) fest \(\iff x=Rx+b\iff(I-R)\,x=b\). Hier: \(\begin{pmatrix}1&1\\-1&1\end{pmatrix}x=\begin{pmatrix}1\\-1\end{pmatrix}\Rightarrow x=(1,0)\) ✓ — genau das Drehzentrum.</div>` },
   ]},

  ]},

/* ==================== 0c) TENSOREN VERSTEHEN (Intuition) ==================== */
{ key:"tensoren", title:"Tensoren verstehen", icon:"🧊", g:5,
  tag:"Zahlenkasten, Multiplikationstabelle, ⊗ — endlich eine Vorstellung davon",
  lead:String.raw`„Tensor" ist das Wort, bei dem alle nicken und keiner ein Bild im Kopf hat. Diese Seite baut das Bild auf: <b>ein Tensor ist ein Zahlenkasten</b>, \(v\otimes w\) ist eine <b>Multiplikationstabelle</b>, und das Ganze existiert, damit <b>bilineare</b> Rechnungen <b>linear</b> werden. Die Rechenrezepte (Kronecker-Produkt, Tensorrang) stehen in <a href="#/ref/dualtensor">Dualraum &amp; Tensorprodukt</a>.`,
  blocks:[

   { h:"Worum geht es überhaupt?", wide:true, cards:[
     { t:"Die Kurzfassung für Eilige", k:"TL;DR",
       def:String.raw`<span class="idea"><b>Ein Tensor in \(V\otimes W\) ist:</b> ein Zahlenkasten. Für \(K^m\otimes K^n\) konkret: eine \(m\times n\)-<b>Tabelle</b> von Koeffizienten — nicht mehr.</span>
<span class="idea"><b>\(v\otimes w\) ist:</b> die <b>Multiplikationstabelle</b> von \(v\) und \(w\): Eintrag \((i,j)\) ist \(v_i\,w_j\). Allgemeine Tensoren sind <b>Summen</b> solcher Tabellen.</span>
<span class="idea"><b>Warum es \(\otimes\) gibt:</b> es verwandelt „Abbildung mit zwei Eingängen" (bilinear) in „Abbildung mit <b>einem</b> Eingang" (linear) — und für lineare Abbildungen haben wir den kompletten Werkzeugkasten: Matrizen, Rang, Kern …</span>
<span class="idea"><b>Merksatz:</b> \(\oplus\) legt Räume <i>nebeneinander</i> (Dimensionen <b>addieren</b> sich), \(\otimes\) spannt eine <i>Tabelle</i> auf (Dimensionen <b>multiplizieren</b> sich).</span>`,
       worte:String.raw`<span class="idea"><b>Wenn du nur eins mitnimmst:</b> Tensor = Tabelle. Ein Vektor hat einen Index (\(v_i\)), eine Matrix zwei (\(a_{ij}\)), ein Tensor darf beliebig viele haben. Alles Weitere auf dieser Seite füllt dieses Bild mit Leben.</span>`,
       bsp:String.raw`<div class="step">\(\dim(\mathbb R^2\otimes\mathbb R^3)=2\cdot3=6\). Basis: die sechs „Kästchen" \(e_i\otimes f_j\) einer \(2\times3\)-Tabelle.</div>
<div class="step">Ein Tensor ist eine Belegung dieser Kästchen mit Zahlen: \(t=\sum_{i,j}a_{ij}\,e_i\otimes f_j\ \leftrightarrow\ \) Matrix \((a_{ij})\).</div>` },

     { t:"Die Maschine: zwei Eingänge rein, einer raus", k:"universelle Eigenschaft",
       def:String.raw`<p><b>Bilinear</b> heißt: zwei Eingänge, linear in jedem einzeln — Beispiele: Skalarprodukt \(\langle v,w\rangle\), das gewöhnliche Malnehmen \(K\times K\to K\), die \(2\times2\)-Determinante als Funktion ihrer beiden Spalten. Solche Abbildungen sind unhandlich. Also baut man einen Raum, der das <b>Verpacken</b> übernimmt:</p>
<div class="smap"><svg viewBox="0 0 880 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Universelle Eigenschaft: bilinear wird linear">
<defs><marker id="uniArr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" class="arr"/></marker></defs>
<rect x="40" y="40" width="250" height="90" rx="12" class="bx"/>
<text x="165" y="72" text-anchor="middle" class="t">V × W</text>
<text x="165" y="94" text-anchor="middle" class="m">Paare (v, w) — zwei Eingänge</text>
<path d="M292 85 H586" class="fl" marker-end="url(#uniArr)"/>
<text x="439" y="72" text-anchor="middle" class="lab">⊗: (v, w) ↦ v ⊗ w — nur verpacken!</text>
<text x="439" y="104" text-anchor="middle" class="lab">nichts wird ausgerechnet</text>
<rect x="590" y="40" width="250" height="90" rx="12" class="b1"/>
<text x="715" y="72" text-anchor="middle" class="t">V ⊗ W</text>
<text x="715" y="94" text-anchor="middle" class="m">fertige Pakete — EIN Eingang</text>
<path d="M165 132 V265 H311" class="fl" marker-end="url(#uniArr)"/>
<text x="178" y="195" class="m">β: bilinear</text>
<text x="178" y="213" class="s">zwei Eingänge, unhandlich</text>
<path d="M715 132 V265 H569" class="fl dash" marker-end="url(#uniArr)"/>
<text x="702" y="195" text-anchor="end" class="m">β̂: dieselbe Abbildung, jetzt linear</text>
<text x="702" y="213" text-anchor="end" class="s">ein Eingang — und eindeutig!</text>
<text x="440" y="178" text-anchor="middle" class="lab">β = β̂ ∘ ⊗ — verpacken, dann linear abarbeiten</text>
<rect x="315" y="230" width="250" height="70" rx="12" class="b4"/>
<text x="440" y="258" text-anchor="middle" class="t">Z — irgendein Zielraum</text>
<text x="440" y="280" text-anchor="middle" class="s">z.B. K (Zahlen)</text>
</svg></div>
<p><b>Die universelle Eigenschaft in einem Satz:</b> \(V\otimes W\) ist der universelle Zwischenspeicher — jede bilineare Abbildung \(\beta\) läuft automatisch über ihn: \(\beta(v,w)=\hat\beta(v\otimes w)\) mit einem eindeutigen linearen \(\hat\beta\).</p>`,
       worte:String.raw`<span class="idea"><b>Wichtigster Punkt:</b> \(\otimes\) rechnet <b>nichts</b> aus. \(v\otimes w\) ist ein unausgerechnetes Produkt — wie das \(X\) im Polynom: man rechnet damit, ohne je eine Zahl einzusetzen.</span>
<span class="idea"><b>Wozu der Umweg?</b> Alles Bilineare wird nach \(V\otimes W\) „ausgelagert" und dort mit der normalen linearen Algebra abgearbeitet. Ein neuer Raum statt hundert Spezialtheorien für bilineare Abbildungen.</span>`,
       bsp:String.raw`<div class="step"><b>Skalarprodukt als Beispiel:</b> \(\beta(v,w)=\langle v,w\rangle\) auf \(\mathbb R^2\) ist bilinear. Die lineare Version \(\hat\beta:\mathbb R^2\otimes\mathbb R^2\to\mathbb R\) ist auf den Basis-Kästchen festgelegt: \(\hat\beta(e_i\otimes e_j)=\delta_{ij}\).</div>
<div class="step"><b>Probe:</b> \(\beta\bigl((2,1),(3,4)\bigr)=10\), und \(\hat\beta\bigl((2,1)\otimes(3,4)\bigr)=\hat\beta(6\,e_1{\otimes}e_1+8\,e_1{\otimes}e_2+3\,e_2{\otimes}e_1+4\,e_2{\otimes}e_2)=6+4=10\) ✓.</div>` },
   ]},

<text x="790" y="225" text-anchor="middle" class="s">3 Indizes · tᵢⱼₖ (Stapel von Tabellen)</text>
<text x="450" y="252" text-anchor="middle" class="s">Ein Tensor ist ein Zahlenkasten — die Stufe zählt die Richtungen (Indizes).</text>
</svg></div>
<p>In LA2 fast immer <b>Stufe 2</b>: Tensoren in \(V\otimes W\) entsprechen Matrizen. Erst ab drei Faktoren (\(U\otimes V\otimes W\)) wird es wirklich neu — und deutlich schwerer.</p>`,
       worte:String.raw`<span class="idea"><b>Alltagsbilder:</b> Vektor = Liste. Matrix = Tabelle. Stufe 3 = Excel-Datei mit mehreren Blättern. Stufe 4 = Ordner voller Excel-Dateien … es sind einfach Zahlen mit mehreren Sortier-Richtungen.</span>
<span class="idea"><b>Physik-Wort „Spannungstensor":</b> ein Zahlenkasten, der zu je zwei Richtungen (Fläche, Kraftrichtung) eine Zahl ausspuckt — Stufe 2, also „nur" eine Matrix mit Bedeutung.</span>`,
       bsp:String.raw`<div class="step">\(t=6\,e_1{\otimes}f_1+2\,e_1{\otimes}f_2+4\,e_1{\otimes}f_3+3\,e_2{\otimes}f_1+1\,e_2{\otimes}f_2+2\,e_2{\otimes}f_3\ \in\mathbb R^2\otimes\mathbb R^3\).</div>
<div class="step">Sieht wild aus — <b>ist</b> aber nur die Tabelle \(\begin{pmatrix}6&2&4\\3&1&2\end{pmatrix}\). Symbolkette und Zahlenkasten sind dasselbe Objekt.</div>` },

     { t:"v ⊗ w = die Multiplikationstabelle", k:"(v⊗w)ᵢⱼ = vᵢ·wⱼ",
       def:String.raw`<p>Der wichtigste Spezialfall: das Paket \(v\otimes w\) selbst. Als Zahlenkasten ist es die <b>Multiplikationstabelle</b> der beiden Vektoren — und rechts daneben der Grund, warum nicht jeder Tensor so aussieht:</p>

</svg></div>`,
       worte:String.raw`<span class="idea"><b>Matrix-Sicht:</b> \(v\otimes w\) ist das <b>äußere Produkt</b> \(v\,w^{\mathsf T}\) — Spalte mal Zeile (nicht Zeile mal Spalte, das gäbe eine Zahl!). Ergebnis: eine Rang-1-Matrix.</span>
<span class="idea"><b>„Verschränkt":</b> bei \(e_1{\otimes}e_1+e_2{\otimes}e_2\) gibt es kein „welches \(v\), welches \(w\)" mehr — die Summe hat die Paar-Information zerstört. In der Quantenmechanik heißt genau dieses Phänomen <b>Verschränkung</b>.</span>`,
       bsp:String.raw`<div class="step">\(v=(2,1)\), \(w=(3,1,2)\): Tabelle \(\begin{pmatrix}2\cdot3&2\cdot1&2\cdot2\\1\cdot3&1\cdot1&1\cdot2\end{pmatrix}=\begin{pmatrix}6&2&4\\3&1&2\end{pmatrix}\), Rang \(1\) ✓.</div>
<div class="step"><b>Gegenprobe Identität:</b> \(\begin{pmatrix}1&0\\0&1\end{pmatrix}\) hat Rang \(2\) — es gibt keine Vektoren mit \(v_iw_j=\delta_{ij}\) (sonst wäre \(v_1w_2=0\), aber \(v_1w_1=v_2w_2=1\) — Widerspruch).</div>` },
   ]},

   { h:"Die Spielregeln", cards:[
     { t:"Rechenregeln: alles bilinear", k:"Klammern ausmultiplizieren",
       def:String.raw`<table class="reftable">
<tr><td class="lhs">\((v+v')\otimes w=v\otimes w+v'\otimes w\)</td><td class="cond">links ausmultiplizieren</td></tr>
<tr><td class="lhs">\(v\otimes(w+w')=v\otimes w+v\otimes w'\)</td><td class="cond">rechts ausmultiplizieren</td></tr>
<tr><td class="lhs">\((\lambda v)\otimes w=\lambda(v\otimes w)=v\otimes(\lambda w)\)</td><td class="cond">Skalar darf wandern</td></tr>
<tr><td class="lhs">\(v\otimes 0=0=0\otimes w\)</td><td class="cond">Null schluckt alles</td></tr>
</table>
<p><b>Kurz:</b> \(\otimes\) verhält sich wie ein „mal", das man nicht ausrechnet — rechnen wie beim Klammern-Ausmultiplizieren.</p>`,
       worte:String.raw`<span class="idea"><b>Faustregel:</b> alles, was du vom Ausmultiplizieren \((a+b)(c+d)\) kennst, gilt — nur die Reihenfolge der Faktoren darfst du nie tauschen.</span>`,
       bsp:String.raw`<div class="step">\((e_1+e_2)\otimes(f_1-f_2)=e_1{\otimes}f_1-e_1{\otimes}f_2+e_2{\otimes}f_1-e_2{\otimes}f_2\).</div>
<div class="step">Als Tabelle: \(\begin{pmatrix}1&-1\\1&-1\end{pmatrix}\) — Rang \(1\) ✓ (klar: es <i>ist</i> ja ein reines Produkt).</div>` },

     { t:"Vorsicht, typische Fallen", k:"⚠",
       def:String.raw`<span class="idea"><b>Falle 1:</b> \(v\otimes w\neq w\otimes v\) — die Tabelle wird transponiert, und für \(v\in\mathbb R^2,\ w\in\mathbb R^3\) haben \(2\times3\) und \(3\times2\) nicht mal dasselbe Format.</span>
<span class="idea"><b>Falle 2:</b> nicht jedes Element von \(V\otimes W\) ist ein reines Produkt \(v\otimes w\) — die reinen Produkte sind nur die <b>Bausteine</b>. (So wie nicht jedes Polynom ein Monom ist.)</span>
<span class="idea"><b>Falle 3:</b> die <b>Summendarstellung</b> ist nicht eindeutig — derselbe Tensor lässt sich verschieden schreiben. Eindeutig ist nur die Koeffizienten-Tabelle (bei festen Basen).</span>`,
       worte:String.raw`<span class="idea"><b>Rettung in allen Fällen:</b> denk in Tabellen, nicht in Symbolketten. Zwei wild verschiedene Summen können dieselbe Tabelle ergeben — dann sind sie derselbe Tensor. Erst Koeffizienten einsortieren, dann vergleichen.</span>`,
       bsp:String.raw`<div class="step">\(e_1{\otimes}f_1+e_1{\otimes}f_2\ \) und \(\ e_1\otimes(f_1+f_2)\): sehen verschieden aus, sind aber beide die Tabelle \(\begin{pmatrix}1&1\\0&0\end{pmatrix}\) — <b>gleicher</b> Tensor.</div>` },

     { t:"Einfach vs. verschränkt — der Tensorrang", k:"rang",
       def:String.raw`<span class="idea"><b>Tensorrang</b> = die kleinste Zahl reiner Produkte, deren Summe den Tensor ergibt.</span>
<span class="idea"><b>Für Stufe 2 geschenkt:</b> Tensorrang = Matrixrang der Koeffizienten-Tabelle. Insbesondere: <b>einfach</b> (\(t=v\otimes w\)) \(\iff\) Rang \(\le1\).</span>
<span class="idea"><b>Braucht man für:</b> Blatt 25 (ist \(t\) ein reines Produkt?) — und als Konzept überall, wo man Tensoren „komprimieren" will.</span>`,
       worte:String.raw`<span class="idea"><b>Rang-1-Test durch Hinschauen:</b> alle Zeilen der Tabelle sind Vielfache einer einzigen Zeile.</span>
<span class="idea"><b>Warnung Stufe 3:</b> ab drei Faktoren gibt es keine Matrix mehr, deren Rang man ablesen könnte — die Tensorrang-Bestimmung wird dort NP-schwer. Stufe 2 ist die gemütliche Welt.</span>`,
       bsp:String.raw`<div class="step">\(e_1{\otimes}e_1+e_2{\otimes}e_2\ \leftrightarrow\ I=\begin{pmatrix}1&0\\0&1\end{pmatrix}\), Rang \(2\): man braucht wirklich zwei Summanden — verschränkt.</div>` },

     { t:"⊕ vs. ⊗ — nebeneinander vs. Tabelle", k:"m+n vs. m·n",
       def:String.raw`<div class="smap"><svg viewBox="0 0 880 235" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Direkte Summe addiert Dimensionen, Tensorprodukt multipliziert sie">
<text x="190" y="60" text-anchor="middle" class="t">V ⊕ W — nebeneinander legen</text>
<rect x="120" y="100" width="26" height="26" class="b1"/><rect x="146" y="100" width="26" height="26" class="b1"/>
<rect x="184" y="100" width="26" height="26" class="b3"/><rect x="210" y="100" width="26" height="26" class="b3"/><rect x="236" y="100" width="26" height="26" class="b3"/>
<text x="190" y="165" text-anchor="middle" class="s">dim: 2 + 3 = 5 Kästchen</text>
<path d="M440 45 V190" class="axis"/>
<text x="620" y="60" text-anchor="middle" class="t">V ⊗ W — Tabelle aufspannen</text>
<text x="593" y="88" text-anchor="middle" class="s">w₁</text><text x="619" y="88" text-anchor="middle" class="s">w₂</text><text x="645" y="88" text-anchor="middle" class="s">w₃</text>
<text x="568" y="112" text-anchor="end" class="s">v₁</text>
<text x="568" y="138" text-anchor="end" class="s">v₂</text>
<rect x="580" y="95" width="26" height="26" class="b2"/><rect x="606" y="95" width="26" height="26" class="b2"/><rect x="632" y="95" width="26" height="26" class="b2"/>
<rect x="580" y="121" width="26" height="26" class="b2"/><rect x="606" y="121" width="26" height="26" class="b2"/><rect x="632" y="121" width="26" height="26" class="b2"/>
<text x="620" y="165" text-anchor="middle" class="s">dim: 2 · 3 = 6 Kästchen</text>
<text x="440" y="215" text-anchor="middle" class="s">⊕: ein v UND ein w — ⊗: für jede Kombination (i, j) ein eigenes Kästchen</text>
</svg></div>`,
       worte:String.raw`<span class="idea"><b>\(\oplus\)-Element:</b> „ein \(v\) und ein \(w\) nebeneinander" — im Grunde ein längerer Vektor, Dimensionen addieren sich.</span>
<span class="idea"><b>\(\otimes\)-Element:</b> jede Index-Kombination \((i,j)\) bekommt einen eigenen Koeffizienten — Dimensionen multiplizieren sich. Deshalb explodiert \(\otimes\) so schnell: \(n\) Qubits leben in einem \(2^n\)-dimensionalen Tensorprodukt — genau das macht Quantencomputer mächtig (und schwer zu simulieren).</span>`,
       bsp:String.raw`<div class="step">\(\mathbb R^2\oplus\mathbb R^3\): \(\dim=5\), Element z.B. \(\bigl((2,1),(3,1,2)\bigr)\) — fünf Zahlen.</div>
<div class="step">\(\mathbb R^2\otimes\mathbb R^3\): \(\dim=6\), Element = \(2\times3\)-Tabelle — sechs Zahlen. Klingt ähnlich, ist es ab \(\dim>2\) überhaupt nicht mehr: \(10+10=20\), aber \(10\cdot10=100\).</div>` },
   ]},

   { h:"Wo Tensoren wirklich stecken", cards:[
     { t:"Plot-Twist: Matrizen sind Tensoren", k:"V*⊗W ≅ Hom(V,W)",
       def:String.raw`<span class="idea"><b>Die Brücke:</b> \(V^{*}\otimes W\cong\operatorname{Hom}(V,W)\). Das Paket \(\varphi\otimes w\) wirkt als Abbildung \(v\mapsto\varphi(v)\cdot w\) — erst <b>messen</b> (\(\varphi\)), dann in Richtung \(w\) <b>losschicken</b>.</span>
<span class="idea"><b>Übersetzung:</b> reiner Tensor \(\varphi\otimes w\) \(\leftrightarrow\) Rang-1-Matrix. Jede Matrix = Summe von Rang-1-Matrizen = Tensor. Du hast also nie ohne Tensoren gerechnet.</span>`,
       worte:String.raw`<span class="idea"><b>Warum das cool ist:</b> die SVD (Singulärwertzerlegung) schreibt eine Matrix als möglichst „kurze" Summe reiner Produkte — das ist Tensorrang in Aktion, und der Rang der Matrix zählt die nötigen Summanden.</span>`,
       bsp:String.raw`<div class="step">\(\varphi=e_1^{*}\) (liest \(x_1\) ab), \(w=e_2\). Dann \((\varphi\otimes w)(v)=v_1\cdot e_2\): schickt \(e_1\mapsto e_2\), \(e_2\mapsto 0\).</div>
<div class="step">Als Matrix: \(\begin{pmatrix}0&0\\1&0\end{pmatrix}\) — Rang \(1\) ✓. Probe: \(\begin{pmatrix}0&0\\1&0\end{pmatrix}\begin{pmatrix}v_1\\v_2\end{pmatrix}=\begin{pmatrix}0\\v_1\end{pmatrix}=v_1 e_2\) ✓.</div>` },

     { t:"Der Werkzeugkasten & der Rest der Welt", k:"wo ⊗ auftaucht",
       def:String.raw`<span class="idea"><b>Bilinearformen:</b> Skalarprodukte und Quadriken sind Elemente von \(V^{*}\otimes V^{*}\) — Stufe-2-Tensoren mit Bedeutung (→ <a href="#/ref/bilinearformen">Skalarprodukte &amp; Bilinearformen</a>).</span>
<span class="idea"><b>Kronecker-Produkt \(A\otimes B\):</b> die Matrix von \(f\otimes g\) — Rechnen mit gekoppelten Systemen (→ <a href="#/ref/dualtensor">Dualraum &amp; Tensorprodukt</a>).</span>
<span class="idea"><b>Draußen in der Welt:</b> Trägheits- und Spannungstensor (Physik), Quantenzustände zusammengesetzter Systeme (\(\mathcal H_1\otimes\mathcal H_2\)), und „TensorFlow"/Deep Learning = Rechnen mit großen Zahlenkästen.</span>`,
       worte:String.raw`<span class="idea"><b>Fürs Blatt/die Prüfung heißt „Tensor" konkret:</b> Kronecker-Produkt hinschreiben, Tensorrang über den Matrixrang bestimmen, natürliche Isomorphismen (wie \(V^{*}\otimes W\cong\operatorname{Hom}(V,W)\)) erkennen. Der Rest ist Weltwissen, das ab jetzt ein Bild hat.</span>` },
   ]},

  ]},

/* ============================ 1) DETERMINANTEN ============================ */
{ key:"determinanten", title:"Determinanten", icon:"▦", g:1,
  tag:"Sarrus, Laplace, Zeilenumformungen, Regeln, Cramer",
  lead:String.raw`Die Determinante ist <b>eine Zahl</b>, die einer quadratischen Matrix zugeordnet wird. Ist sie \(\neq0\), ist die Matrix invertierbar. Man braucht sie ständig — vor allem für Eigenwerte (\(\det(A-\lambda I)=0\)). Je nach Matrix ist ein anderer Rechenweg am schnellsten.`,
  blocks:[
   { h:"Berechnungsmethoden", cards:[
     { t:"Regel von Sarrus", k:"nur 3×3",
       def:String.raw`\[\det\begin{pmatrix}a&b&c\\d&e&f\\g&h&i\end{pmatrix}=aei+bfg+cdh-ceg-afh-bdi\]`,
       worte:String.raw`<span class="idea"><b>Idee:</b> Bei genau \(3\times3\) gibt es eine feste „Schema-Formel", die man stur anwendet — kein Umformen, kein Nachdenken.</span>
         <span class="idea"><b>Bausteine:</b> drei Produkte entlang der Diagonalen nach rechts-unten (Vorzeichen \(+\)) und drei nach rechts-oben (Vorzeichen \(-\)); am Rand „läuft man um" (daher „Jägerzaun"). Es ist nur die allgemeine Leibniz-Formel mit ihren \(3!=6\) Summanden, ausgeschrieben.</span>
         <span class="idea"><b>Warum praktisch:</b> der schnellste Handgriff, wenn die Matrix wirklich \(3\times3\) ist.</span>
         <div class="warnbox"><b>Nur für \(n=3\)!</b> Für \(n\ge4\) ist eine analoge „Diagonalen-Regel" <b>falsch</b>. Dann Laplace oder Zeilenumformungen benutzen.</div>`,
       bsp:String.raw`<p>Gesucht \(\det A\) für \(A=\begin{pmatrix}-2&1&0\\-1&0&-1\\1&2&3\end{pmatrix}\) (Blatt 14 V1a).</p>
         <div class="step"><b>Diagonalen \(\searrow\) (plus):</b><br>\((-2)\cdot0\cdot3=0\), \(\quad1\cdot(-1)\cdot1=-1\), \(\quad0\cdot(-1)\cdot2=0\). Summe \(=-1\).</div>
